services:
  db:
    image: mysql:8.0
    container_name: internal-api-db
    ports:
      - "63306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: internal_api_db
      MYSQL_USER: user
      MYSQL_PASSWORD: user1234
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./mysql/data:/var/lib/mysql